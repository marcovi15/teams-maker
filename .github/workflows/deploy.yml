name: Deploy to AWS

on:
  push:
    branches:
      - deployment-branch

jobs:
  deploy:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # -------------------------------
      # STEP 1: Create & upload Lambda Layer
      # -------------------------------
      - name: Create and upload Lambda dependency layer
        run: |
          mkdir -p python
          pip install -r requirements.txt -t python/
          zip -r dependencies_layer.zip python
          aws s3 cp dependencies_layer.zip s3://footy-lambda-deployment/layers/dependencies_layer.zip
          aws lambda publish-layer-version \
            --layer-name footy-dependencies \
            --content S3Bucket=footy-lambda-deployment,S3Key=layers/dependencies_layer.zip \
            --compatible-runtimes python3.11 \
            --region eu-north-1 \
            --output json > layer_output.json

      - name: Extract Layer ARN
        id: layer
        run: |
          echo "LAYER_ARN=$(jq -r .LayerVersionArn layer_output.json)" >> $GITHUB_OUTPUT

      # -------------------------------
      # STEP 2: Deploy Lambdas (code only)
      # -------------------------------
      - name: Package and deploy footyAppBackground
        run: |
          mkdir -p lambda_package
          cp footyAppBackground.py lambda_package/lambda_function.py
          cp data_paths.py lambda_package/
          cp players-db-key.json teams-maker-key.json lambda_package/
          zip -r footyAppBackground.zip lambda_package
          aws s3 cp footyAppBackground.zip s3://footy-lambda-deployment/lambdas/footyAppBackground.zip
          aws lambda update-function-code \
            --function-name footyAppBackground \
            --s3-bucket footy-lambda-deployment \
            --s3-key lambdas/footyAppBackground.zip
          aws lambda update-function-configuration \
            --function-name footyAppBackground \
            --layers ${{ steps.layer.outputs.LAYER_ARN }}

      - name: Package and deploy footyApp
        run: |
          mkdir -p lambda_package
          cp footyApp.py lambda_package/lambda_function.py
          zip -r footyApp.zip lambda_package
          aws s3 cp footyApp.zip s3://footy-lambda-deployment/lambdas/footyApp.zip
          aws lambda update-function-code \
            --function-name footyApp \
            --s3-bucket footy-lambda-deployment \
            --s3-key lambdas/footyApp.zip
          aws lambda update-function-configuration \
            --function-name footyApp \
            --layers ${{ steps.layer.outputs.LAYER_ARN }}

      - name: Package and deploy footyAppStatus
        run: |
          mkdir -p lambda_package
          cp footyAppStatus.py lambda_package/lambda_function.py
          zip -r footyAppStatus.zip lambda_package
          aws s3 cp footyAppStatus.zip s3://footy-lambda-deployment/lambdas/footyAppStatus.zip
          aws lambda update-function-code \
            --function-name footyAppStatus \
            --s3-bucket footy-lambda-deployment \
            --s3-key lambdas/footyAppStatus.zip
          aws lambda update-function-configuration \
            --function-name footyAppStatus \
            --layers ${{ steps.layer.outputs.LAYER_ARN }}
