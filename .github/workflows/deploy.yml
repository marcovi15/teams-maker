name: Deploy FootyApp Lambdas

on:
  push:
    branches:
      - deployment-branch

env:
  AWS_REGION: eu-north-1
  ACCOUNT_ID: 881287412835

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and deploy Lambdas
        run: |
          declare -A LAMBDAS=(
            [teamsMakerFront]=teamsmakerfront
            [teamsMakerStatus]=teamsmakerstatus
            [teamsMakerBackground]=teamsmakerbackground
          )

          for FUNCTION in "${!LAMBDAS[@]}"; do
            REPO=${LAMBDAS[$FUNCTION]}
            IMAGE_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO}:latest

            echo "Building $FUNCTION..."
            docker build -t $IMAGE_URI lambdas/$FUNCTION

            docker push $IMAGE_URI

            aws lambda update-function-code \
              --function-name $FUNCTION \
              --image-uri $IMAGE_URI
          done
