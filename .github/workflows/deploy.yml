name: Deploy to AWS

on:
  push:
    branches:
      - deployment-branch

jobs:
  deploy:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy footyAppBackground.py
        run: |
          mkdir -p lambda_package
          pip install --target=lambda_package -r requirements.txt
          cp footyAppBackground.py lambda_package/lambda_function.py
          cp data_paths.py lambda_package/
          cd lambda_package
          zip -r ../footyAppBackground.zip .
          aws lambda update-function-code --function-name footyAppBackground --zip-file fileb://footyAppBackground.zip

      - name: Deploy footyApp.py
        run: |
          mkdir -p lambda_package
          pip install --target=lambda_package -r requirements.txt
          cp footyApp.py lambda_package/lambda_function.py
          cp lambda_package/
          cd lambda_package
          zip -r ../footyApp.zip .          
          aws lambda update-function-code --function-name footyApp --zip-file fileb://footyApp.zip

      - name: Deploy footyAppStatus.py
        run: |
          mkdir -p lambda_package
          pip install --target=lambda_package -r requirements.txt
          cp footyAppStatus.py lambda_package/lambda_function.py
          cp lambda_package/
          cd lambda_package
          zip -r ../footyAppStatus.zip .
          aws lambda update-function-code --function-name footyAppStatus --zip-file fileb://footyAppStatus.zip
